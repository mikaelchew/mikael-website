<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Mikael Chew</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #000;
      color: #fff;
      text-align: center;
      padding: 2rem;
    }

    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 700;
      color: #c0392b;
      line-height: 1;
      margin: 0;
    }

    .error-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      margin: 0.5rem 0 1rem;
      color: #fff;
    }

    .error-message {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      color: #888;
      max-width: 420px;
      margin: 0 auto 2.5rem;
      line-height: 1.6;
    }

    .error-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .error-footer {
      position: absolute;
      bottom: 2rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="error-page">
    <p class="error-code">404</p>
    <h1 class="error-heading" data-en="Page Not Found" data-zh="找不到頁面">Page Not Found</h1>
    <p class="error-message" data-en="The page you're looking for doesn't exist or has been moved." data-zh="您尋找的頁面不存在或已被移動。">The page you're looking for doesn't exist or has been moved.</p>
    <div class="error-buttons">
      <a href="index.html" class="btn-primary" data-en="Back to Home" data-zh="返回首頁">Back to Home</a>
      <a href="blog.html" class="btn-outline" data-en="Read My Blog" data-zh="閱讀我的部落格">Read My Blog</a>
    </div>
    <div class="error-footer">
      <p data-en="&copy; 2026 Mikael Chew" data-zh="&copy; 2026 周俊德 (Mikael Chew)">&copy; 2026 Mikael Chew</p>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="js/main.js"></script>
  <!-- Toggle Controls (fixed bottom-right) -->
  <div class="site-toggles">
    <button class="toggle-btn theme-btn" aria-label="Toggle theme"><i class="fas fa-sun"></i></button>
    <button class="toggle-btn lang-btn" aria-label="Switch language">中文</button>
  </div>
</body>
</html>
